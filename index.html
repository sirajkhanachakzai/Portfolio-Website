<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siraj Khan Achakzai</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f1724;
  color:white;
}

/* Navbar */
header{
  padding:15px;
  text-align:center;
  background:#020617;
  font-weight:bold;
}

/* Section */
section{
  padding:40px 20px;
  text-align:center;
}

/* Projects */
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.project{
  background:#020617;
  padding:15px;
  border-radius:12px;
}

.project img{
  width:100%;
  border-radius:10px;
}

.btn{
  display:inline-block;
  margin:8px;
  padding:8px 12px;
  border-radius:8px;
  text-decoration:none;
  font-size:14px;
}

.primary{background:#3b82f6;color:white;}
.ghost{background:#111;color:white;}

/* Chatbot */
#chatToggle{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;height:60px;
  border-radius:50%;
  background:linear-gradient(90deg,#3b82f6,#ff3d81);
  border:none;color:white;font-size:20px;
}

#chatBox{
  position:fixed;
  bottom:90px;
  right:20px;
  width:300px;height:400px;
  background:#020617;
  border-radius:12px;
  display:none;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:10px;
  overflow:auto;
}

.msg{margin:5px;}
.user{text-align:right;}
.bot{text-align:left;}

.bubble{
  display:inline-block;
  padding:6px 10px;
  border-radius:8px;
}

.user .bubble{background:#3b82f6;}
.bot .bubble{background:#1f2937;}

input{
  width:70%;
  padding:8px;
  border:none;
}

button.send{
  width:30%;
  background:#3b82f6;
  border:none;color:white;
}
</style>
</head>

<body>

<header>Siraj Khan Achakzai — AI Developer 🤖</header>

<section>
  <h2>My Projects 💼</h2>

  <div class="projects">

    <div class="project">
      <img src="https://images.unsplash.com/photo-1556742049-0cfed4f6a45d">
      <h3>AI Social Media Tool</h3>
      <a href="https://aisocialmediaautomation.netlify.app/" class="btn primary">Live</a>
      <a href="https://github.com/sirajkhanachakzai/Social-Media-Lead-Automation-Tool" class="btn ghost">Code</a>
    </div>

    <div class="project">
      <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
      <h3>AI Student Assistant</h3>
      <a href="https://ai-studentasistant.netlify.app/" class="btn primary">Live</a>
      <a href="https://github.com/sirajkhanachakzai/Student-Ai-Assistant" class="btn ghost">Code</a>
    </div>

    <div class="project">
      <img src="https://images.unsplash.com/photo-1484480974693-6ca0a78fb36b">
      <h3>Task Manager</h3>
      <a href="https://modrentaskmanager.netlify.app/" class="btn primary">Live</a>
      <a href="https://github.com/sirajkhanachakzai/Modern-Task-Manager" class="btn ghost">Code</a>
    </div>

    <div class="project">
      <img src="https://images.unsplash.com/photo-1551434678-e076c223a692">
      <h3>LinkedIn AI Tool</h3>
      <a href="https://ailinkdenspy.netlify.app/" class="btn primary">Live</a>
      <a href="https://github.com/sirajkhanachakzai/AI-Powered-LinkedIn-Lead-Qualification" class="btn ghost">Code</a>
    </div>

    <div class="project">
      <img src="https://images.unsplash.com/photo-1501117716987-c8e1ecb210b2">
      <h3>Hotel System</h3>
      <a href="https://aihotelmanagment.netlify.app/" class="btn primary">Live</a>
      <a href="https://github.com/sirajkhanachakzai/Hotel-Management-System" class="btn ghost">Code</a>
    </div>

  </div>
</section>

<!-- Chatbot -->
<button id="chatToggle">💬</button>

<div id="chatBox">
  <div class="messages" id="messages"></div>

  <div>
    <input id="input">
    <button class="send" onclick="sendMsg()">Send</button>
  </div>
</div>

<script>
const toggle=document.getElementById("chatToggle");
const chatBox=document.getElementById("chatBox");
const messages=document.getElementById("messages");
const input=document.getElementById("input");

toggle.onclick=()=>chatBox.style.display=
chatBox.style.display==="flex"?"none":"flex";

function addMsg(text,type){
  let div=document.createElement("div");
  div.className="msg "+type;
  div.innerHTML=`<div class="bubble">${text}</div>`;
  messages.appendChild(div);
  messages.scrollTop=messages.scrollHeight;
}

function botReply(t){
  t=t.toLowerCase();

  if(t.includes("hi")) return "Hello 👋";
  if(t.includes("project")) return "Check my projects above 💼";
  if(t.includes("contact")) return "Use contact section 📩";
  if(t.includes("skills")) return "HTML CSS JS React AI 🤖";

  return "Ask about projects, skills, or contact 😄";
}

function sendMsg(){
  let text=input.value.trim();
  if(!text)return;

  addMsg(text,"user");
  input.value="";

  setTimeout(()=>{
    addMsg(botReply(text),"bot");
  },500);
}
</script>

</body>
</html>
